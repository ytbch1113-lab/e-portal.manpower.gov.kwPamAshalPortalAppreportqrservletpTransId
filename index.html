<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:#222;text-align:center}
#loader{color:white;font-family:Arial;padding-top:40px}
canvas{width:100%;max-width:900px;background:white}
</style>
</head>
<body>

<div id="loader">Loading...</div>
<canvas id="pdf"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

async function loadPdf(){
  try{
    const pdf = await pdfjsLib.getDocument('last.pdf?v=' + Date.now()).promise;
    const page = await pdf.getPage(1);

    const scale = 2;
    const viewport = page.getViewport({scale});
    const canvas = document.getElementById('pdf');
    const context = canvas.getContext('2d');

    canvas.width = viewport.width;
    canvas.height = viewport.height;

    await page.render({canvasContext: context, viewport}).promise;
    document.getElementById('loader').style.display = 'none';
  }catch(e){
    setTimeout(loadPdf, 1000);
  }
}

loadPdf();
</script>

</body>
</html>
